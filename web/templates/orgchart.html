{{define "content"}}
<div class="container">
    <div class="page-header">
        <h2>Org Chart</h2>
        <p class="text-muted">Hierarchical view based on reporting relationships</p>
    </div>
    <div class="graph-container" id="org-chart" style="height: 600px; background: #161b22; border: 1px solid #30363d; border-radius: 8px;"></div>
</div>

<script nonce="{{.Nonce}}" src="/static/js/vendor/cytoscape-3.30.4.min.js"></script>
<script nonce="{{.Nonce}}" src="/static/js/vendor/dagre-0.8.5.min.js"></script>
<script nonce="{{.Nonce}}" src="/static/js/vendor/cytoscape-dagre-2.5.0.js"></script>
<script nonce="{{.Nonce}}">
(function() {
    const stakeholders = {{.Stakeholders | json}};
    const relationships = {{.Relationships | json}};

    // Only show reports_to relationships for org chart
    const reportingRels = relationships.filter(r => r.type === 'reports_to');

    const nodes = stakeholders.map(s => ({
        data: {
            id: s.id,
            label: s.name + (s.job_title ? '\n' + s.job_title : ''),
            department: s.department
        }
    }));

    const edges = reportingRels.map(r => ({
        data: {
            source: r.to_stakeholder_id,
            target: r.from_stakeholder_id
        }
    }));

    const deptColors = {};
    const palette = ['#58a6ff','#3fb950','#d2a8ff','#f0883e','#f85149','#79c0ff','#56d364'];
    let colorIdx = 0;
    stakeholders.forEach(s => {
        if (s.department && !deptColors[s.department]) {
            deptColors[s.department] = palette[colorIdx++ % palette.length];
        }
    });

    cytoscape.use(cytoscapeDagre);

    cytoscape({
        container: document.getElementById('org-chart'),
        elements: { nodes, edges },
        style: [
            { selector: 'node', style: {
                'label': 'data(label)',
                'background-color': function(ele) { return deptColors[ele.data('department')] || '#8b949e'; },
                'shape': 'round-rectangle', 'width': 140, 'height': 50,
                'color': '#e6edf3', 'font-size': '10px', 'text-valign': 'center',
                'text-wrap': 'wrap', 'text-max-width': 120,
                'border-width': 1, 'border-color': '#30363d'
            }},
            { selector: 'edge', style: {
                'line-color': '#30363d', 'target-arrow-color': '#30363d',
                'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'width': 2
            }}
        ],
        layout: { name: 'dagre', rankDir: 'TB', spacingFactor: 1.5, animate: true }
    });
})();
</script>
{{end}}
